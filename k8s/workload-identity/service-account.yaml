# Namespace where the workload pods will run
apiVersion: v1
kind: Namespace
metadata:
  name: app
---
# Service account for workload pods
# The annotation links it to the Azure managed identity we just created
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-sa
  namespace: app
  annotations:
    # Client ID of the Azure managed identity — tells Azure which identity to use
    azure.workload.identity/client-id: "2351b557-a290-4434-84f4-cfbd2bfc6e1c"
  labels:
    # Required label — tells the cluster this service account uses workload identity
    azure.workload.identity/use: "true"